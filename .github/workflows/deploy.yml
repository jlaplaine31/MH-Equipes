name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_MSAL_CLIENT_ID: ${{ vars.MSAL_CLIENT_ID }}
          VITE_MSAL_AUTHORITY: ${{ vars.MSAL_AUTHORITY }}
          VITE_MSAL_REDIRECT_URI: ${{ vars.MSAL_REDIRECT_URI }}
          VITE_DATAVERSE_URL: ${{ vars.DATAVERSE_URL }}
          VITE_FLOW_URL: ${{ vars.FLOW_URL }}
          VITE_USE_MOCK: ${{ vars.USE_MOCK || 'false' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
